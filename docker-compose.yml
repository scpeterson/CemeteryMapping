services:
  db:
    image: postgis/postgis:17-3.5
    container_name: cemetery-mapping-db-${APP_ENV:-dev}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cemetery_mapping_dev}
      POSTGRES_USER: ${POSTGRES_USER:-cemetery_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cemetery_app_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cemetery-postgres-data-${APP_ENV:-dev}:/var/lib/postgresql/data
      - ./db/seed:/seed:ro
      - ./db/validation:/validation:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cemetery_app} -d ${POSTGRES_DB:-cemetery_mapping_dev}"]
      interval: 5s
      timeout: 5s
      retries: 12

  liquibase:
    image: liquibase/liquibase:4.33.0
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/changelog:/liquibase/changelog
    working_dir: /liquibase

volumes:
  cemetery-postgres-data-dev:
  cemetery-postgres-data-test:
  cemetery-postgres-data-stage:
  cemetery-postgres-data-prod:
